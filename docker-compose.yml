services:
  db:
    image: postgres:16-alpine
    container_name: opkit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opkit
      POSTGRES_PASSWORD: opkit
      POSTGRES_DB: opkit
    ports:
      - "5432:5432"
    volumes:
      - opkit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opkit -d opkit"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opkit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - opkit_redis_data:/data

volumes:
  opkit_pg_data:
  opkit_redis_data:
